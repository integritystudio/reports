<!DOCTYPE html>
<html lang="en" data-brand="hub">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt Library</title>
  <link rel="stylesheet" href="../css/portal-base.css">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="css/prompts-library.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <header>
    <div class="header-content">
      <h1>AI Prompt Library</h1>
      <p class="subtitle">Curated collection of AI personas and prompts from fka/prompts.chat</p>
    </div>
  </header>

  <main id="main">
    <!-- Search & Filter Bar -->
    <section class="prompts-search-section">
      <div class="search-container">
        <input
          type="text"
          id="promptSearch"
          class="search-input"
          placeholder="Search prompts by name, category, or content..."
          aria-label="Search prompts"
        >
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
      </div>

      <div class="filter-controls">
        <button class="filter-btn active" data-filter="all">All Prompts</button>
        <button class="filter-btn" data-filter="dev">Developer</button>
        <button class="filter-btn" data-filter="general">General</button>
      </div>
    </section>

    <!-- Prompts Grid -->
    <section class="prompts-section">
      <div class="prompts-grid" id="promptsGrid">
        <!-- Dynamically populated by JavaScript -->
      </div>
    </section>

    <!-- Prompt Detail Modal -->
    <div class="prompt-modal" id="promptModal">
      <div class="modal-content">
        <button class="modal-close" id="closeModal" aria-label="Close prompt details">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>

        <div class="modal-header">
          <span class="modal-category" id="modalCategory"></span>
          <h2 id="modalTitle"></h2>
        </div>

        <div class="modal-metadata">
          <div class="metadata-item">
            <span class="label">Contributor:</span>
            <span id="modalContributor"></span>
          </div>
          <div class="metadata-item">
            <span class="label">Source:</span>
            <a href="https://prompts.chat" target="_blank" rel="noopener noreferrer">prompts.chat</a>
          </div>
          <div class="metadata-item">
            <span class="label">License:</span>
            <span>CC0 1.0 (Public Domain)</span>
          </div>
        </div>

        <div class="modal-body">
          <h3>Prompt</h3>
          <div class="prompt-content" id="promptContent"></div>
        </div>

        <div class="modal-actions">
          <button class="copy-btn" id="copyPromptBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
            </svg>
            Copy Prompt
          </button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p>&copy; 2026 Integrity Studio. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/prompts-library.js" defer></script>
</body>
</html>
