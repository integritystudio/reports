name: Deploy prompts-api Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/prompts-api/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/prompts-api
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pywrangler
        run: uv sync

      - name: Deploy worker
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run --config prd -- uv run pywrangler deploy

  seed-catalog:
    name: Seed KV catalog
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install Python deps
        run: pip install httpx

      - name: Seed catalog.json to KV
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          KV_NAMESPACE_ID: ea9267c947334bf89917e218f3cd6ce7
        run: doppler run --config prd -- python3 workers/prompts-api/scripts/seed_kv.py --catalog-only
