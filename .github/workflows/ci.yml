name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  smoke-test:
    name: Smoke Test (python3 http.server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Start HTTP server
        run: npm run prompts:serve &

      - name: Wait for server
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:8000/ > /dev/null && echo "Server ready" && exit 0
            echo "Waiting... ($i)"
            sleep 1
          done
          echo "Server did not start in time" && exit 1

      - name: Check key pages
        run: |
          check() {
            status=$(curl -o /dev/null -sw "%{http_code}" "http://localhost:8000/$1")
            if [ "$status" != "200" ]; then
              echo "FAIL $1 — HTTP $status"
              exit 1
            fi
            echo "OK   $1"
          }
          check ""
          check "index.html"
          check "prompts/index.html"
          check "prompts/prompt.html"
          check "prompts/prompt-view.css"
          check "prompts/prompts-layout.css"
          check "prompts/metadata/catalog.json"
          check "css/portal-base.css"
          check "css/theme.css"
